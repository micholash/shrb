<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 수학 미로 탈출 - 백룸 심연 모드</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 요청하신 Firebase 설정값 그대로 적용
        const firebaseConfig = {
            apiKey: "AIzaSyA7kuCSB9UsaCtOYIhsQGuil0-g5rIh_Fs",
            authDomain: "bloodborne-b1aae.firebaseapp.com",
            databaseURL: "https://bloodborne-b1aae-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bloodborne-b1aae",
            storageBucket: "bloodborne-b1aae.firebasestorage.app",
            messagingSenderId: "415284045901",
            appId: "1:415284045901:web:ec45dcb66a955811c45404",
            measurementId: "G-N1MV59ZVQV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveGameStats = async function(stats) {
            try {
                await addDoc(collection(db, "game_clears"), {
                    ...stats,
                    timestamp: new Date()
                });
                console.log("✅ 통계가 Firebase에 저장되었습니다.");
            } catch (e) {
                console.error("❌ 저장 실패:", e);
            }
        };
    </script>
</head>
<body>
    <div id="math-panel" class="hidden"> 
        <div id="question-text" class="question">문제를 생성 중입니다...</div>
        <div id="options-text" class="options"></div>
        <div class="timer-bar"><div id="timer-fill"></div></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <canvas id="minimap" width="150" height="150"></canvas>
        <div id="instruction">화면을 클릭하여 심연으로 진입하세요<br>(마우스 고정 해제: ESC)</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
