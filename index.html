<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 수학 미로 탈출 - 백룸 심연 모드</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
    // 🚀 서버 도메인 설정 (현재는 로컬, 나중에 배포하면 주소 변경!)
    const BACKEND_URL = "http://localhost:5000";

    // 🌟 수정된 기록 저장 함수
    window.saveGameStats = async function(stats) {
        try {
            const response = await fetch(`${BACKEND_URL}/save_stats`, {
                method: "POST", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(stats)
            });
            const result = await response.json();
            if(result.status === "success") console.log("✅ 기록 완료!");
        } catch (e) { 
            console.error("❌ 서버 통신 실패", e); 
        }
    };
    </script>
</head>
<body>
    
    <script src="script.js"></script>
</body>
</html>
