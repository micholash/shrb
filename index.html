<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미로 탈출</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7kuCSB9UsaCtOYIhsQGuil0-g5rIh_Fs",
        authDomain: "bloodborne-b1aae.firebaseapp.com",
        databaseURL: "https://bloodborne-b1aae-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bloodborne-b1aae",
        storageBucket: "bloodborne-b1aae.firebasestorage.app",
        messagingSenderId: "415284045901",
        appId: "1:415284045901:web:ec45dcb66a955811c45404",
        measurementId: "G-N1MV59ZVQV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 기존 게임 로직(script.js)에서 호출하던 함수 그대로 사용 가능하게 덮어씌움
    window.saveGameStats = async function(stats) {
        try {
            const statsRef = ref(db, 'game_clears');
            await push(statsRef, {
                ...stats,
                serverTimestamp: new Date().toISOString()
            });
            console.log("✅ 통계가 Realtime Database에 저장되었습니다.");
        } catch (e) {
            console.error("❌ 저장 실패:", e);
        }
    };
</script>
</head>
<body>
    <div id="login-panel" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white;">
        <h2 style="font-family: sans-serif; margin-bottom: 20px;">심연에 진입할 이름을 입력하세요</h2>
        <input type="text" id="playerIdInput" placeholder="닉네임" style="padding: 10px; font-size: 16px; margin-bottom: 20px; text-align: center;">
        <button id="startGameBtn" style="padding: 10px 30px; font-size: 18px; cursor: pointer;">입장</button>
    </div>

    <div id="math-panel" class="hidden">
        <div id="question-text" class="question">문제를 생성 중입니다...</div>
        <div id="options-text" class="options"></div>
        <div class="timer-bar"><div id="timer-fill"></div></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <canvas id="minimap" width="150" height="150"></canvas>
        <div id="instruction">화면을 클릭하여 진입하세요<br>(마우스 고정 해제: ESC)</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
